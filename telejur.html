<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        :root { --verde-telejur: #075E54; --azul-admin: #0056b3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); position: relative; }
        
        /* ALINHAMENTO DA LISTA (CORREÇÃO DEFINITIVA) */
        .item-lista { 
            display: grid; 
            grid-template-columns: 1fr auto; /* Nome ocupa o espaço disponível, Select ocupa apenas o necessário */
            align-items: center; 
            gap: 10px;
            padding: 12px 0; 
            border-bottom: 1px solid #f1f1f1;
        }
        .item-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .nome-func { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Estilos Gerais */
        h2 { color: var(--verde-telejur); text-align: center; margin: 35px 0 20px; font-size: 22px; }
        .card-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 16px; font-weight: bold; color: var(--verde-telejur); }
        .status-box label { font-size: 9px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        select, input { width: 100%; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; background: #fff; box-sizing: border-box; }
        .hidden { display: none !important; }

        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-admin-top { background: var(--azul-admin); border: none; color: white; font-size: 10px; padding: 8px 15px; border-radius: 50px; cursor: pointer; position: absolute; top: 15px; right: 15px; font-weight: bold; }
        
        /* DESIGN SEÇÃO ADMIN (LIMPO) */
        #admin-area { border: 2px dashed var(--azul-admin); padding: 20px; border-radius: 12px; background: #f9fcff; margin-top: 10px; }
        .btn-sair { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .label-peq { font-size: 12px; font-weight: bold; color: var(--verde-telejur); display: block; margin-bottom: 5px; }
        
        /* Estilo da lista dentro do admin */
        .admin-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button id="btn-admin-trigger" class="btn-admin-top" onclick="abrirPainelAdmin()">⚙️ GESTÃO</button>
    
    <div id="visao-usuario">
        <h2>📋 Frequência Telejur</h2>
        
        <label class="label-peq">MODO:</label>
        <select id="modo-envio" onchange="alternarModo()" style="margin-bottom: 15px;">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Ponto Individual (GPS)</option>
        </select>

        <div id="status-gps" class="hidden" style="background:#6c757d; color:white; padding:12px; border-radius:8px; text-align:center; margin-bottom:15px; font-size:14px; font-weight:bold;">Buscando GPS...</div>

        <div id="campos-individual" class="hidden">
            <label class="label-peq">FUNCIONÁRIO:</label>
            <select id="select-individual" style="margin-bottom: 15px;"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
                <div class="status-box"><span id="count-faltajust">0</span><label>Justific.</label></div>
                <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
            </div>
            <div id="corpo-lista"></div>
        </div>
        <button id="btn-enviar-wa" class="enviar" onclick="enviarWhatsapp()">🚀 ENVIAR WHATSAPP</button>
    </div>

    <div id="admin-area" class="hidden">
        <h3 style="color: var(--azul-admin); text-align: center; margin-top: 0;">Painel Administrativo</h3>
        
        <label class="label-peq">NOVO COLABORADOR:</label>
        <input type="text" id="novo-nome" placeholder="Nome Completo" style="margin-bottom: 8px;">
        <input type="password" id="senha-admin" placeholder="Senha do Sistema" style="margin-bottom: 8px;">
        <button onclick="addFunc()" style="width:100%; background:var(--azul-admin); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">CADASTRAR</button>
        
        <label class="label-peq" style="margin-top: 20px;">REMOVER COLABORADORES:</label>
        <div id="lista-admin-corpo" style="max-height:250px; overflow-y:auto; margin-top:10px;"></div>
        
        <button class="btn-sair" onclick="sairAdmin()">🚪 FECHAR E VOLTAR</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    let equipe = [];

    async function carregarDados() {
        try {
            const res = await fetch(API_URL + "?acao=ler");
            equipe = await res.json();
            renderizar();
        } catch (e) { console.error("Erro de conexão"); }
    }

    function renderizar() {
        const listaUsuario = document.getElementById('corpo-lista');
        const selIndiv = document.getElementById('select-individual');
        const listaAdmin = document.getElementById('lista-admin-corpo');
        
        listaUsuario.innerHTML = ""; selIndiv.innerHTML = ""; listaAdmin.innerHTML = "";

        equipe.forEach((nome, i) => {
            // Lista Usuário - Alinhamento Grid
            listaUsuario.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" style="width: 110px; padding: 5px; font-size: 11px;" onchange="monitorar()">
                        <option value="Falta sem justificativa">Falta s/ J.</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Férias">Férias</option>
                        <option value="Em viagem">Viagem</option>
                        <option value="Falta justificada">Justificada</option>
                    </select>
                </div>`;
            
            selIndiv.innerHTML += `<option value="${nome}">${nome}</option>`;
            
            // Lista Admin - Somente Gerência
            listaAdmin.innerHTML += `
                <div class="admin-item">
                    <span>${nome}</span>
                    <button onclick="delFunc('${nome}')" style="border:none; background:none; color:red; cursor:pointer; font-weight:bold;">Remover</button>
                </div>`;
        });
        monitorar();
    }

    function abrirPainelAdmin() {
        if(prompt("Senha:") === "123") {
            document.getElementById('visao-usuario').classList.add('hidden');
            document.getElementById('admin-area').classList.remove('hidden');
            document.getElementById('btn-admin-trigger').classList.add('hidden');
        }
    }

    function sairAdmin() {
        document.getElementById('visao-usuario').classList.remove('hidden');
        document.getElementById('admin-area').classList.add('hidden');
        document.getElementById('btn-admin-trigger').classList.remove('hidden');
    }

    async function addFunc() {
        const n = document.getElementById('novo-nome').value;
        const s = document.getElementById('senha-admin').value;
        if(!n || !s) return alert("Preencha os campos!");
        await fetch(`${API_URL}?acao=add&nome=${encodeURIComponent(n)}&senha=${s}`);
        document.getElementById('novo-nome').value = "";
        await carregarDados();
        alert("Adicionado!");
    }

    async function delFunc(nome) {
        const s = document.getElementById('senha-admin').value;
        if(!s) return alert("Digite a senha admin no campo acima!");
        if(confirm(`Remover ${nome}?`)) {
            await fetch(`${API_URL}?acao=deletar&nome=${encodeURIComponent(nome)}&senha=${s}`);
            await carregarDados();
        }
    }

    function monitorar() {
        let f=0, a=0, j=0, s=0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (cb && !cb.checked) {
                sel.classList.remove('hidden');
                const v = sel.value;
                if (v === "Férias") f++;
                else if (v === "Atestado") a++;
                else if (v === "Falta justificada") j++;
                else s++;
            } else if(sel) { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    function alternarModo() {
        const m = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', m === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', m === 'geral');
        document.getElementById('status-gps').classList.toggle('hidden', m === 'geral');
    }

    function enviarWhatsapp() {
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = `*FREQUÊNCIA TELEJUR*\nData: ${data}\n\n`;
        equipe.forEach((nome, i) => {
            const cb = document.getElementById(`check-${i}`);
            if (cb.checked) msg += `✅ ${nome}\n`;
            else msg += `❌ ${nome} (${document.getElementById(`motivo-${i}`).value})\n`;
        });
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    window.onload = carregarDados;
</script>
</body>
</html>
