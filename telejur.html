<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        :root {
            --primary: #075E54;
            --secondary: #25D366;
            --accent: #007bff;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; color: #333; }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            position: relative; 
            box-sizing: border-box; 
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        
        .btn-admin-top { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0, 123, 255, 0.1); color: var(--accent); 
            border: 1px solid rgba(0, 123, 255, 0.2); padding: 8px 14px; 
            border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold;
            transition: all 0.3s;
        }
        .btn-admin-top:hover { background: var(--accent); color: white; }

        .card-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        
        .status-box { 
            background: #fff; padding: 12px; border-radius: 16px; 
            border: 1px solid #edf2f7; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .status-box span { display: block; font-size: 20px; font-weight: 800; color: var(--primary); }
        .status-box label { font-size: 10px; text-transform: uppercase; color: #a0aec0; font-weight: 700; letter-spacing: 1px; }

        .item-lista { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 10px; border-bottom: 1px solid #f8fafc; 
            transition: background 0.2s;
        }
        .item-lista:hover { background-color: #fcfdfe; }
        
        .item-info { display: flex; align-items: center; gap: 12px; }
        .item-info input[type="checkbox"] { 
            width: 20px; height: 20px; accent-color: var(--secondary); cursor: pointer; 
        }
        .nome-func { font-size: 15px; font-weight: 500; color: #2d3748; }
        
        select, input[type="text"] { 
            width: 100%; font-size: 14px; border-radius: 12px; 
            border: 1.5px solid #e2e8f0; padding: 14px; background: #fff; 
            margin-bottom: 15px; box-sizing: border-box; outline: none;
            transition: border-color 0.3s;
        }
        select:focus { border-color: var(--accent); }

        .hidden { display: none !important; }

        .btn-gps { 
            background: #edf2f7; color: #4a5568; border: none; 
            padding: 15px; border-radius: 14px; font-weight: 600; 
            margin-bottom: 20px; width: 100%; font-size: 14px; 
            text-align: center; transition: all 0.3s ease;
        }
        
        button.enviar { 
            width: 100%; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
            color: white; border: none; padding: 18px; font-size: 17px; 
            border-radius: 16px; cursor: pointer; font-weight: 700; 
            margin-top: 10px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button.enviar:active { transform: scale(0.98); }

        .label-peq { font-size: 11px; font-weight: 700; color: #718096; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        #secao-gestao { 
            border: 2px dashed var(--accent); padding: 20px; 
            border-radius: 20px; background: #f0f7ff; margin-top: 10px; 
        }
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: white; border-radius: 10px;
            margin-bottom: 8px; font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-admin-top" onclick="abrirGestao()">⚙️ GESTÃO</button>
    
    <div id="interface-usuario">
        <h2>📋 Frequência</h2>

        <label class="label-peq">Modo de Operação</label>
        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">⌛ Localizando posição...</div>

        <div id="campos-individual" class="hidden">
            <label class="label-peq">Selecionar Funcionário</label>
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
                <div class="status-box"><span id="count-faltajust">0</span><label>Justificado</label></div>
                <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
            </div>
            <div id="corpo-lista">Buscando equipe...</div>
        </div>

        <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar Relatório</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="text-align:center; color:var(--accent); margin-top:0;">Gestão da Equipe</h3>
        <input type="text" id="novo-nome" placeholder="Nome completo...">
        <button onclick="addFuncionario()" style="width:100%; background:var(--accent); color:white; border:none; padding:14px; border-radius:12px; font-weight:bold; cursor:pointer;">CADASTRAR</button>
        
        <div id="lista-admin" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
        
        <button onclick="fecharGestao()" style="width:100%; background:#718096; color:white; border:none; padding:12px; border-radius:12px; margin-top:15px; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script>
    // A Lógica permanece EXATAMENTE a mesma que você enviou, sem alterar nenhuma função.
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    let equipe = [];
    
    const pontosAlcoa = [
        { nome: "ALCOA - PORTO", lat: -2.1677, lon: -56.1017 },
        { nome: "ALCOA - BENEFICIAMENTO", lat: -2.4488, lon: -56.1708 }
    ];

    let dadosLoc = { link: "", enderecoFormatado: "", unidadeMsg: "", statusMsg: "", hora: "" };

    function chamadaAPI(params, callbackFn) {
        const id = 'jsonp_' + Date.now();
        window[id] = (data) => { callbackFn(data); delete window[id]; document.getElementById(id).remove(); };
        const script = document.createElement('script');
        script.id = id;
        script.src = `${URL_GOOGLE}?${params}&callback=${id}`;
        document.body.appendChild(script);
    }

    function atualizarDados() {
        chamadaAPI("acao=ler", (data) => {
            equipe = Array.isArray(data) ? data : [];
            renderizarListas();
        });
    }

    function renderizarListas() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        const listaAdmin = document.getElementById('lista-admin');
        listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaAdmin.innerHTML = "";

        equipe.forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" style="width: auto; padding: 5px; margin-bottom: 0;" onchange="monitorar()">
                        <option value="Falta sem justificativa">Falta</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Férias">Férias</option>
                        <option value="Em viagem">Viagem</option>
                        <option value="Falta justificada">Justificada</option>
                    </select>
                </div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
            listaAdmin.innerHTML += `
                <div class="admin-item">
                    <span>${nome}</span>
                    <button onclick="deletarFuncionario('${nome}')" style="background:none; border:none; color:#e53e3e; cursor:pointer; font-size: 18px;">✕</button>
                </div>`;
        });
        monitorar();
    }

    function abrirGestao() {
        const senha = prompt("Senha de Administrador:");
        if (senha === "123") {
            document.getElementById('interface-usuario').classList.add('hidden');
            document.getElementById('secao-gestao').classList.remove('hidden');
        } else { alert("Senha incorreta!"); }
    }

    function fecharGestao() {
        document.getElementById('interface-usuario').classList.remove('hidden');
        document.getElementById('secao-gestao').classList.add('hidden');
    }

    function addFuncionario() {
        const nome = document.getElementById('novo-nome').value.trim();
        if (!nome) return;
        chamadaAPI(`acao=add&nome=${encodeURIComponent(nome)}&senha=123`, (res) => {
            if (res === "OK") {
                document.getElementById('novo-nome').value = "";
                atualizarDados();
            }
        });
    }

    function deletarFuncionario(nome) {
        if (!confirm("Remover " + nome + "?")) return;
        chamadaAPI(`acao=deletar&nome=${encodeURIComponent(nome)}&senha=123`, (res) => {
            if (res === "OK") atualizarDados();
        });
    }

    function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
        const R = 6371000; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    async function obterGps() {
        const statusGps = document.getElementById('status-gps');
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude; const lon = pos.coords.longitude;
            dadosLoc.hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            dadosLoc.link = `http://maps.google.com/maps?q=${lat},${lon}`;
            
            let plantaIdentificada = null;
            for (const p of pontosAlcoa) {
                if (calcularDistanciaMetros(lat, lon, p.lat, p.lon) <= 800) { plantaIdentificada = p.nome; break; }
            }

            if (plantaIdentificada) {
                dadosLoc.unidadeMsg = plantaIdentificada; dadosLoc.statusMsg = "Presente na Planta";
                dadosLoc.enderecoFormatado = plantaIdentificada;
                statusGps.innerHTML = `✅ ${plantaIdentificada} - ${dadosLoc.hora}`;
                statusGps.style.backgroundColor = "#e6fffa";
                statusGps.style.color = "#2c7a7b";
            } else {
                dadosLoc.unidadeMsg = "FORA DA PLANTA"; dadosLoc.statusMsg = "Ausente da planta";
                statusGps.innerHTML = `🛑 FORA DA PLANTA - ${dadosLoc.hora}`;
                statusGps.style.backgroundColor = "#fff5f5";
                statusGps.style.color = "#c53030";
            }
        }, null, { enableHighAccuracy: true });
    }

    function monitorar() {
        let f = 0, a = 0, j = 0, s = 0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (cb && !cb.checked) {
                sel.classList.remove('hidden');
                if (sel.value === "Férias") f++; else if (sel.value === "Atestado") a++; else if (sel.value === "Falta justificada") j++; else s++;
            } else if (sel) { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        if (modo === 'individual') { document.getElementById('status-gps').classList.remove('hidden'); obterGps(); }
        else { document.getElementById('status-gps').classList.add('hidden'); }
    }

    function enviarWhatsapp() {
        const modo = document.getElementById('modo-envio').value;
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = "";

        if (modo === "individual") {
            const nome = document.getElementById('select-individual').value;
            msg = `*RELATÓRIO DE FREQUÊNCIA INDIVIDUAL*\n\n✅ *Empresa: Telejur*\n📅 Data: ${data}\n⏰ Hora: ${dadosLoc.hora}\n👤 Funcionário: _${nome}_\n\n🏢 *Unidade:* ${dadosLoc.unidadeMsg}\n📍 *Local:* ${dadosLoc.enderecoFormatado}\n📊 *Status:* ${dadosLoc.statusMsg}\n🔗 *Link GPS:* ${dadosLoc.link}`;
        } else {
            let cat = { planta: [], ferias: [], atestado: [], viagem: [], just: [], falta: [] };
            equipe.forEach((nome, i) => {
                const cb = document.getElementById(`check-${i}`);
                if (cb.checked) cat.planta.push(`_${nome}_`);
                else {
                    const mot = document.getElementById(`motivo-${i}`).value;
                    if (mot === "Férias") cat.ferias.push(`_${nome}_`);
                    else if (mot === "Atestado") cat.atestado.push(`_${nome}_`);
                    else if (mot === "Em viagem") cat.viagem.push(`_${nome}_`);
                    else if (mot === "Falta justificada") cat.just.push(`_${nome}_`);
                    else cat.falta.push(`_${nome}_`);
                }
            });
            msg = `Segue Lista de frequência de hoje.\n\n✅ *Empresa: Telejur*\nData: ${data}\n\n` +
                  `✔️ *Efetivo na planta: ${cat.planta.length}*\n${cat.planta.join('\n')}\n\n` +
                  `✔️ *Férias (${cat.ferias.length})*${cat.ferias.length > 0 ? ': ' + cat.ferias.join(', ') : ''}\n\n` +
                  `✔️ *Atestado (${cat.atestado.length})*${cat.atestado.length > 0 ? ': ' + cat.atestado.join(', ') : ''}\n\n` +
                  `✔️ *Em viagem (${cat.viagem.length})*${cat.viagem.length > 0 ? ': ' + cat.viagem.join(', ') : ''}\n\n` +
                  `✔️ *Falta justificada (${cat.just.length})*${cat.just.length > 0 ? ': ' + cat.just.join(', ') : ''}\n\n` +
                  `✔️ *Faltas (${cat.falta.length})*${cat.falta.length > 0 ? ': ' + cat.falta.join(', ') : ''}`;
        }
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    window.onload = atualizarDados;
</script>
</body>
</html>
