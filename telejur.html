<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #075E54; text-align: center; margin-bottom: 20px; font-size: 22px; }
        
        /* Contadores do Topo */
        .card-status { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 18px; font-weight: bold; color: #075E54; }
        .status-box label { font-size: 10px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        /* Lista de Nomes */
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-info { display: flex; align-items: center; gap: 12px; }
        .item-info input { transform: scale(1.4); cursor: pointer; }
        
        select { font-size: 11px; border-radius: 5px; border: 1px solid #d9534f; padding: 4px; color: #d9534f; background: #fff; font-weight: bold; }
        .hidden { visibility: hidden; width: 0; }

        button { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Frequência Telejur</h2>

    <div class="card-status">
        <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
        <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
        <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
    </div>

    <div id="lista-equipe">
        </div>

    <button onclick="enviarWhatsapp()">🚀 Enviar para Mirielly</button>
</div>

<script>
    const equipe = ["Adriano Ferreira", "Cezar Prado", "Deivison Aleidson", "Edenildo Rodrigues", "Francivaldo Costa", "Joelcinei Guimarães", "Jean Soares", "Lucas Santos", "Matheus Costa", "Welyton Pereira", "Ruan Barros"];
    
    const listaDiv = document.getElementById('lista-equipe');

    // Monta a lista na tela
    equipe.forEach((nome, i) => {
        listaDiv.innerHTML += `
            <div class="item-lista">
                <div class="item-info">
                    <input type="checkbox" id="check-${i}" checked onchange="monitorar(${i})">
                    <span id="label-${i}">${nome}</span>
                </div>
                <select id="motivo-${i}" class="hidden" onchange="monitorar()">
                    <option value="Falta sem justificativa">❌ Falta</option>
                    <option value="atestado">🏥 Atestado</option>
                    <option value="Férias">🌴 Férias</option>
                </select>
            </div>
        `;
    });

    function monitorar(index) {
        let f = 0, a = 0, faltas = 0;
        
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            const txt = document.getElementById(`label-${i}`);

            if (!cb.checked) {
                sel.classList.remove('hidden');
                txt.style.color = "#aaa";
                if (sel.value === "Férias") f++;
                else if (sel.value === "atestado") a++;
                else faltas++;
            } else {
                sel.classList.add('hidden');
                txt.style.color = "#000";
            }
        });

        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltas').innerText = faltas;
    }

    function enviarWhatsapp() {
        const data = new Date().toLocaleDateString('pt-BR');
        let pres = [], fer = [], ate = [], fal = [];

        equipe.forEach((nome, i) => {
            const cb = document.getElementById(`check-${i}`);
            if (cb.checked) pres.push(nome);
            else {
                const mot = document.getElementById(`motivo-${i}`).value;
                if (mot === "Férias") fer.push(nome);
                else if (mot === "atestado") ate.push(nome);
                else fal.push(nome);
            }
        });

        let msg = `Segue Lista de frequência de hoje. Atentar nas observações.\n\n` +
            `✅ *Empresa: Telejur*\n` +
            `Data: ${data}\n\n` +
            `✔️Efetivo na planta: ${pres.length}\n${pres.join('\n')}\n\n` +
            `✔️Férias (${fer.length})${fer.length ? ': ' + fer.join(', ') : ''}\n\n` +
            `✔️atestado (${ate.length})${ate.length ? ': ' + ate.join(', ') : ''}\n\n` +
            `✔️Falta sem justificativa (${fal.length})${fal.length ? ': ' + fal.join(', ') : ''}`;

        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }
</script>
</body>
</html>
