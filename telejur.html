<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Juruti</title>
    <style>
        :root {
            --primary: #007bff; /* Azul solicitado para os títulos */
            --secondary: #25D366;
            --accent: #0056b3;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; color: #333; }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden;
            min-height: 500px;
        }

        /* Títulos em Azul */
        .titulo-principal { color: var(--primary); text-align: center; margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; }
        .sub-titulo { color: var(--primary); text-align: center; margin: 5px 0 25px 0; font-size: 16px; font-weight: 600; }
        
        .btn-admin-top { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0, 123, 255, 0.1); color: var(--primary); 
            border: 1px solid rgba(0, 123, 255, 0.2); padding: 8px 14px; 
            border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold;
        }

        .card-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .status-box { background: #fff; padding: 12px; border-radius: 16px; border: 1px solid #edf2f7; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .status-box span { display: block; font-size: 20px; font-weight: 800; color: #075E54; }
        .status-box label { font-size: 10px; text-transform: uppercase; color: #a0aec0; font-weight: 700; }

        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f8fafc; }
        .item-info { display: flex; align-items: center; gap: 12px; }
        .nome-func { font-size: 15px; font-weight: 500; }
        
        select, input[type="text"] { width: 100%; font-size: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; padding: 14px; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        .hidden { display: none !important; }

        /* GPS Centralizado */
        .btn-gps { 
            background: #edf2f7; color: #4a5568; border: none; padding: 15px; border-radius: 14px; 
            font-weight: 600; margin-bottom: 20px; width: 100%; font-size: 14px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; min-height: 70px; box-sizing: border-box;
        }
        
        button.enviar { 
            width: 100%; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
            color: white; border: none; padding: 18px; font-size: 16px; border-radius: 16px; 
            cursor: pointer; font-weight: 700; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            transition: transform 0.2s;
        }
        button.enviar:active { transform: scale(0.98); }

        .label-peq { font-size: 11px; font-weight: 700; color: #718096; display: block; margin-bottom: 8px; text-transform: uppercase; }

        /* Tela de Sucesso */
        #tela-sucesso {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            z-index: 100; padding: 20px; box-sizing: border-box;
        }
        #tela-sucesso h1 { color: var(--secondary); font-size: 60px; margin: 0; }

        #secao-gestao { border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; background: #f0f7ff; margin-top: 10px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 10px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-sucesso" class="hidden">
        <h1>✅</h1>
        <h2 style="color: #2d3748;">Registrado com sucesso</h2>
        <p id="msg-agradecimento" style="font-size: 18px; color: #718096;"></p>
        <button onclick="reiniciar()" style="margin-top:30px; background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:12px; cursor:pointer; font-weight:bold;">Novo Registro</button>
    </div>

    <button class="btn-admin-top" onclick="abrirGestao()">⚙️ GESTÃO</button>
    
    <div id="interface-usuario">
        <h1 class="titulo-principal">Frequência Funcionário Telejur</h1>
        <p class="sub-titulo">Unidade Juruti</p>

        <label class="label-peq">Modo de Operação</label>
        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">⌛ Localizando posição...</div>

        <div id="campos-individual" class="hidden">
            <label class="label-peq">Funcionário</label>
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
                <div class="status-box"><span id="count-faltajust">0</span><label>Justificado</label></div>
                <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
            </div>
            <div id="corpo-lista">Buscando equipe...</div>
        </div>

        <button id="btn-principal" class="enviar" onclick="processarEnvio()">🚀 Enviar lista de frequencia</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="text-align:center; color:var(--primary); margin-top:0;">Gestão da Equipe</h3>
        <input type="text" id="novo-nome" placeholder="Nome do funcionário...">
        <button onclick="addFuncionario()" style="width:100%; background:var(--primary); color:white; border:none; padding:14px; border-radius:12px; font-weight:bold; cursor:pointer;">CADASTRAR</button>
        <div id="lista-admin" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
        <button onclick="fecharGestao()" style="width:100%; background:#718096; color:white; border:none; padding:12px; border-radius:12px; margin-top:15px; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    let equipe = [];
    let dadosLoc = { link: "", unidadeMsg: "", statusMsg: "", hora: "" };
    
    // BIP SONORO (Gerado via código para não precisar de arquivo externo)
    function emitirBip() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, context.currentTime); // Nota Lá (A5)
        gain.gain.setValueAtTime(0.1, context.currentTime);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.1);
    }

    function chamadaAPI(params, callbackFn) {
        const id = 'jsonp_' + Date.now();
        window[id] = (data) => { callbackFn(data); delete window[id]; document.getElementById(id).remove(); };
        const script = document.createElement('script');
        script.id = id;
        script.src = `${URL_GOOGLE}?${params}&callback=${id}`;
        document.body.appendChild(script);
    }

    function atualizarDados() {
        chamadaAPI("acao=ler", (data) => {
            equipe = Array.isArray(data) ? data : [];
            renderizarListas();
        });
    }

    function renderizarListas() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        const listaAdmin = document.getElementById('lista-admin');
        listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaAdmin.innerHTML = "";
        equipe.forEach((nome, i) => {
            listaDiv.innerHTML += `<div class="item-lista"><div class="item-info"><input type="checkbox" id="check-${i}" checked onchange="monitorar()"><span class="nome-func">${nome}</span></div><select id="motivo-${i}" class="hidden" style="width: auto; padding: 5px; margin-bottom: 0;" onchange="monitorar()"><option value="Falta sem justificativa">Falta</option><option value="Atestado">Atestado</option><option value="Férias">Férias</option><option value="Em viagem">Viagem</option><option value="Falta justificada">Justificada</option></select></div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
            listaAdmin.innerHTML += `<div class="admin-item"><span>${nome}</span><button onclick="deletarFuncionario('${nome}')" style="background:none; border:none; color:#e53e3e; cursor:pointer; font-size: 18px;">✕</button></div>`;
        });
        monitorar();
    }

    async function obterGps() {
        const statusGps = document.getElementById('status-gps');
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude; const lon = pos.coords.longitude;
            dadosLoc.hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            // Lógica simples de proximidade (Porto/Beneficiamento)
            const isPorto = Math.abs(lat - (-2.1677)) < 0.005; 
            if (isPorto) {
                dadosLoc.unidadeMsg = "ALCOA - PORTO"; dadosLoc.statusMsg = "Presente na Planta";
                statusGps.innerHTML = `<span>✅ ALCOA - PORTO</span><small>${dadosLoc.hora}</small>`;
                statusGps.style.backgroundColor = "#e6fffa"; statusGps.style.color = "#2c7a7b";
            } else {
                dadosLoc.unidadeMsg = "FORA DA PLANTA"; dadosLoc.statusMsg = "Ausente";
                statusGps.innerHTML = `<span>🛑 FORA DA PLANTA</span><small>${dadosLoc.hora}</small>`;
                statusGps.style.backgroundColor = "#fff5f5"; statusGps.style.color = "#c53030";
            }
        }, null, { enableHighAccuracy: true });
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        const btn = document.getElementById('btn-principal');
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        if (modo === 'individual') {
            document.getElementById('status-gps').classList.remove('hidden');
            btn.innerText = "🚀 Registrar frequencia";
            obterGps();
        } else {
            document.getElementById('status-gps').classList.add('hidden');
            btn.innerText = "🚀 Enviar lista de frequencia";
        }
    }

    function processarEnvio() {
        emitirBip();
        const modo = document.getElementById('modo-envio').value;
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = "";
        let nomeSucesso = "Equipe";

        if (modo === "individual") {
            nomeSucesso = document.getElementById('select-individual').value;
            msg = `*RELATÓRIO INDIVIDUAL - TELEJUR*\n👤 Func.: ${nomeSucesso}\n🏢 Unidade: ${dadosLoc.unidadeMsg}\n📍 GPS: ${dadosLoc.link}`;
        } else {
            msg = "Segue lista de frequência da equipe...";
        }
        
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
        
        // Exibir tela de confirmação
        document.getElementById('msg-agradecimento').innerText = `Obrigado, ${nomeSucesso}`;
        document.getElementById('tela-sucesso').classList.remove('hidden');
    }

    function reiniciar() { document.getElementById('tela-sucesso').classList.add('hidden'); atualizarDados(); }
    function monitorar() {
        let f = 0, a = 0, j = 0, s = 0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (cb && !cb.checked) {
                sel.classList.remove('hidden');
                if (sel.value === "Férias") f++; else if (sel.value === "Atestado") a++; else if (sel.value === "Falta justificada") j++; else s++;
            } else if (sel) { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    function abrirGestao() { if (prompt("Senha:") === "123") { document.getElementById('interface-usuario').classList.add('hidden'); document.getElementById('secao-gestao').classList.remove('hidden'); } }
    function fecharGestao() { document.getElementById('interface-usuario').classList.remove('hidden'); document.getElementById('secao-gestao').classList.add('hidden'); }
    function addFuncionario() { const n = document.getElementById('novo-nome').value.trim(); if (!n) return; chamadaAPI(`acao=add&nome=${encodeURIComponent(n)}&senha=123`, () => { document.getElementById('novo-nome').value = ""; atualizarDados(); }); }
    function deletarFuncionario(n) { if (confirm("Remover " + n + "?")) chamadaAPI(`acao=deletar&nome=${encodeURIComponent(n)}&senha=123`, () => atualizarDados()); }

    window.onload = atualizarDados;
</script>
</body>
</html>
