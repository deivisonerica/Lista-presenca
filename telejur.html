<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Juruti</title>
    <style>
        :root { --primary: #007bff; --secondary: #25D366; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--white); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; box-sizing: border-box; min-height: 600px; overflow: hidden; display: flex; flex-direction: column; }
        .header-area { text-align: center; margin-bottom: 15px; }
        .titulo-principal { color: var(--primary); font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-titulo { color: var(--primary); font-size: 14px; font-weight: 600; margin: 5px 0 10px 0; }
        .btn-gps { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 12px; border-radius: 16px; margin-bottom: 15px; text-align: center; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f8fafc; }
        select, input[type="text"] { width: 100%; font-size: 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; padding: 12px; margin-bottom: 12px; outline: none; }
        .select-tipo { border: 2px solid var(--primary); font-weight: bold; color: var(--primary); background: #f0f7ff; }
        .msg-info { font-size: 11px; color: #2d3748; background: #ebf8ff; padding: 8px; border-radius: 8px; margin-bottom: 10px; text-align: center; font-weight: 600; }
        .hidden { display: none !important; }
        button.enviar { width: 100%; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; border: none; padding: 20px; font-size: 18px; border-radius: 16px; cursor: pointer; font-weight: 700; }
        #tela-sucesso { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .progress-bar { width: 150px; height: 6px; background: #eee; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 1.5s linear; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-sucesso" class="hidden">
        <h1 style="font-size: 60px; margin: 0;">🚀</h1>
        <h2 id="status-title">Validando...</h2>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="interface-usuario">
        <div class="header-area">
            <button onclick="abrirGestao()" style="font-size: 10px; border: none; background: none; color: #cbd5e0; cursor: pointer;">⚙️ ADMIN</button>
            <h1 class="titulo-principal">Controle Juruti</h1>
            <p class="sub-titulo">Telejur - Alcoa</p>
        </div>

        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Equipe (Geral)</option>
            <option value="individual">Batida de Ponto (Individual)</option>
        </select>

        <div id="bloco-tipo-registro" class="hidden"> <div id="msg-auto" class="msg-info">🤖 Analisando horário...</div>
            <select id="tipo-registro" class="select-tipo">
                <option value="Chegada">🏁 Chegada / Início de Turno</option>
                <option value="Início de Almoço">🍴 Início de Almoço</option>
                <option value="Término de Almoço">🍱 Término de Almoço</option>
                <option value="Saída">🚪 Saída / Fim de Turno</option>
            </select>
        </div>

        <div id="status-gps" class="btn-gps hidden">
            <b id="txt-local">⌛ Localizando GPS...</b><br>
            <span id="relogio-agora" style="font-weight: 800; font-size: 20px;">00:00:00</span>
        </div>

        <div id="campos-individual" class="hidden">
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div id="corpo-lista" style="max-height: 280px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px;"></div>
        </div>

        <button id="btn-principal" class="enviar" onclick="processarEnvio()" style="margin-top: 20px;">🚀 VALIDAR E ENVIAR</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="text-align:center">Gestão</h3>
        <input type="text" id="novo-nome" placeholder="Nome...">
        <button onclick="addFuncionario()" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:8px;">+ Adicionar</button>
        <div id="lista-admin" style="margin-top:10px; border:1px solid #eee; max-height: 150px; overflow-y: auto;"></div>
        <button onclick="fecharGestao()" style="width:100%; margin-top:10px;">Voltar</button>
    </div>
</div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    
    let equipe = [];
    let watchID = null;
    let dadosLoc = { link: "Ponto Manual", unidadeMsg: "NÃO VALIDADO GPS", horaEnvio: "" };
    const locais = { porto: { lat: -2.1677, lon: -56.1017 }, beneficiamento: { lat: -2.3166, lon: -56.2415 } };

    function alternarModo() {
        const m = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', m === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', m === 'geral');
        document.getElementById('status-gps').classList.toggle('hidden', m === 'geral');
        document.getElementById('bloco-tipo-registro').classList.toggle('hidden', m === 'geral');
        if (m === 'individual') iniciarGps();
    }

    function checarSugestaoHorario() {
        const agora = new Date();
        const totalMin = (agora.getHours() * 60) + agora.getMinutes();
        const s = document.getElementById('tipo-registro');
        const hoje = agora.toLocaleDateString('pt-BR');

        if (totalMin < 600) s.value = "Chegada";
        else if (totalMin >= 630 && totalMin <= 840) {
            const jaAlmocou = localStorage.getItem('almoco_' + hoje);
            s.value = jaAlmocou ? "Término de Almoço" : "Início de Almoço";
        } 
        else if (totalMin >= 870) s.value = "Saída";
    }

    function processarEnvio() {
        const modo = document.getElementById('modo-envio').value;
        const tipoReg = (modo === "geral") ? "Chegada" : document.getElementById('tipo-registro').value;
        const nomeFinal = (modo === "individual") ? document.getElementById('select-individual').value : "Equipe Geral";
        
        document.getElementById('status-title').innerText = "Salvando na Planilha...";
        document.getElementById('tela-sucesso').classList.remove('hidden');
        document.getElementById('fill').style.width = "100%";

        const params = `acao=salvar_ponto&nome=${encodeURIComponent(nomeFinal)}&tipo=${encodeURIComponent(tipoReg)}&local=${encodeURIComponent(dadosLoc.unidadeMsg)}&link=${encodeURIComponent(dadosLoc.link)}`;
        
        chamadaAPI(params, (res) => {
            const dataH = new Date().toLocaleDateString('pt-BR');
            let msg = "";

            if (modo === "individual") {
                if (tipoReg === "Início de Almoço") localStorage.setItem('almoco_' + dataH, 'true');
                msg = `*PONTO VALIDADO - JURUTI*\n\n📌 *Tipo:* ${tipoReg}\n👤 *Nome:* ${nomeFinal}\n🏢 *Local:* ${dadosLoc.unidadeMsg}\n📅 *Data:* ${dataH}\n⏰ *Hora:* ${dadosLoc.horaEnvio}\n📍 *GPS:* ${dadosLoc.link}`;
            } else {
                let p = [], f = [];
                equipe.forEach((n, i) => {
                    const cb = document.getElementById(`check-${i}`);
                    if (cb.checked) p.push(`- _${n}_`);
                    else f.push(`- _${n}_ (${document.getElementById(`motivo-${i}`).value})`);
                });
                msg = `*LISTA DE FREQUÊNCIA - JURUTI*\n📌 *Status:* Início de Turno\n📅 *Data:* ${dataH}\n\n✅ *PRESENTES:* ${p.length}\n${p.join('\n')}\n\n❌ *AUSENTES:* ${f.length}\n${f.join('\n')}`;
            }

            // ABERTURA DO WHATSAPP
            setTimeout(() => {
                const urlWa = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
                window.location.href = urlWa; // Método mais robusto para mobile
            }, 1000);
        });
    }

    // Funções de Apoio
    function chamadaAPI(p, cb) { 
        const id = 'j'+Date.now(); 
        window[id]=d=>{cb(d);delete window[id];document.getElementById(id).remove();}; 
        const s=document.createElement('script'); s.id=id; s.src=`${URL_GOOGLE}?${p}&callback=${id}`; 
        document.body.appendChild(s); 
    }

    function atualizarDados() {
        chamadaAPI("acao=ler", (data) => {
            equipe = Array.isArray(data) ? data : [];
            const listaDiv = document.getElementById('corpo-lista');
            const selInd = document.getElementById('select-individual');
            const listaAdm = document.getElementById('lista-admin');
            listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaAdm.innerHTML = "";
            equipe.forEach((nome, i) => {
                listaDiv.innerHTML += `<div class="item-lista"><span>${nome}</span><div style="display:flex; gap:8px;"><input type="checkbox" id="check-${i}" checked onchange="monitorar()"><select id="motivo-${i}" class="hidden" style="width:100px; font-size:10px; padding:2px; margin:0;"><option value="Falta">Falta</option><option value="Atestado">Atestado</option><option value="Férias">Férias</option></select></div></div>`;
                selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
                listaAdm.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">${nome} <button onclick="deletarFuncionario('${nome}')">🗑️</button></div>`;
            });
        });
    }

    function iniciarGps() {
        if (!navigator.geolocation) return;
        watchID = navigator.geolocation.watchPosition((pos) => {
            const { latitude: lat, longitude: lon } = pos.coords;
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            const distP = Math.sqrt(Math.pow(lat - locais.porto.lat, 2) + Math.pow(lon - locais.porto.lon, 2));
            dadosLoc.unidadeMsg = (distP < 0.01) ? "NA PLANTA (ALCOA)" : "FORA DA PLANTA";
            document.getElementById('txt-local').innerText = "📍 " + dadosLoc.unidadeMsg;
        }, null, {enableHighAccuracy: true});
    }

    function monitorar() { equipe.forEach((_, i) => { const cb = document.getElementById(`check-${i}`); document.getElementById(`motivo-${i}`).classList.toggle('hidden', cb.checked); }); }
    function abrirGestao() { if(prompt("Senha:") === "123") { document.getElementById('interface-usuario').classList.add('hidden'); document.getElementById('secao-gestao').classList.remove('hidden'); } }
    function fecharGestao() { document.getElementById('secao-gestao').classList.add('hidden'); document.getElementById('interface-usuario').classList.remove('hidden'); }
    function addFuncionario() { const i = document.getElementById('novo-nome'); const n = i.value; if(!n) return; chamadaAPI(`acao=add&nome=${encodeURIComponent(n)}&senha=123`, () => { alert('Ok!'); i.value=""; atualizarDados(); }); }
    function deletarFuncionario(n) { if(confirm(`Remover ${n}?`)) { chamadaAPI(`acao=deletar&nome=${encodeURIComponent(n)}&senha=123`, () => { atualizarDados(); }); } }
    function reiniciar() { document.getElementById('tela-sucesso').classList.add('hidden'); document.getElementById('fill').style.width = "0%"; }

    window.onload = () => { 
        atualizarDados(); 
        setInterval(() => {
            const agora = new Date();
            document.getElementById('relogio-agora').innerText = agora.toLocaleTimeString('pt-BR');
            dadosLoc.horaEnvio = agora.toLocaleTimeString('pt-BR');
            checarSugestaoHorario();
        }, 1000);
    };
</script>
</body>
</html>
