<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        :root { --verde-telejur: #075E54; --azul-admin: #0056b3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); position: relative; }
        
        h2 { color: var(--verde-telejur); text-align: center; margin: 35px 0 20px; font-size: 22px; }

        /* ALINHAMENTO TRAVADO */
        .item-lista { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 5px; 
            border-bottom: 1px solid #f1f1f1; 
        }
        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .item-info input { transform: scale(1.3); cursor: pointer; flex-shrink: 0; }
        .nome-func { font-size: 14px; color: #333; }
        
        /* Select da lista com largura fixa para não desalinhar */
        .item-lista select { width: 140px !important; margin-bottom: 0; padding: 5px; font-size: 12px; height: 32px; }

        /* Estilos de Status e Inputs */
        .card-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 16px; font-weight: bold; color: var(--verde-telejur); }
        .status-box label { font-size: 9px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        select, input { width: 100%; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; background: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }

        .btn-gps { background-color: #6c757d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; width: 100%; font-size: 14px; text-align: center; line-height: 1.4; min-height: 50px; }
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        
        .btn-admin-top { background: var(--azul-admin); border: none; color: white; font-size: 10px; padding: 8px 15px; border-radius: 50px; cursor: pointer; position: absolute; top: 15px; right: 15px; font-weight: bold; }
        #admin-area { border: 2px dashed var(--azul-admin); padding: 20px; border-radius: 12px; background: #f9fcff; margin-top: 10px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
        .label-peq { font-size: 12px; font-weight: bold; color: var(--verde-telejur); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-admin-top" onclick="abrirPainelAdmin()">⚙️ GESTÃO</button>
    
    <div id="secao-principal">
        <h2>📋 Frequência Telejur</h2>

        <label class="label-peq">MODO DE ENVIO:</label>
        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Formulário Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">⌛ Localizando...</div>

        <div id="campos-individual" class="hidden">
            <label class="label-peq">FUNCIONÁRIO:</label>
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
                <div class="status-box"><span id="count-faltajust">0</span><label>F. Justif.</label></div>
                <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
            </div>
            <div id="corpo-lista"></div>
        </div>

        <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar no WhatsApp</button>
    </div>

    <div id="admin-area" class="hidden">
        <h3 style="color: var(--azul-admin); text-align: center;">Painel de Gestão</h3>
        <input type="text" id="novo-nome" placeholder="Nome do Funcionário">
        <button onclick="addFunc()" style="width:100%; background:var(--azul-admin); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">CADASTRAR</button>
        <div id="lista-admin-corpo" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
        <button onclick="sairAdmin()" style="width:100%; margin-top:10px; padding:10px; border-radius:8px; border:none; background:#666; color:white;">VOLTAR</button>
    </div>
</div>

<script>
    let equipe = ["Adriano Nascimento", "Cezar Prado", "Deivison Aleidson", "Edenildo Rodrigues", "Francivaldo Costa", "Joelcinei Guimarães", "Jean Soares", "Lucas Santos", "Matheus Costa", "Welyton Pereira", "Ruan Barros", "Rafael Gonçalves"];
    
    const pontosAlcoa = [
        { nome: "ALCOA - PORTO", lat: -2.1677, lon: -56.1017 },
        { nome: "ALCOA - BENEFICIAMENTO", lat: -2.4488, lon: -56.1708 }
    ];

    let dadosLoc = { link: "", enderecoFormatado: "", unidadeMsg: "", statusMsg: "", hora: "" };

    function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function carregarLista() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        const listaAdm = document.getElementById('lista-admin-corpo');
        listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaAdm.innerHTML = "";
        
        equipe.forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" onchange="monitorar()">
                        <option value="Falta sem justificativa">Falta s/ Just.</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Férias">Férias</option>
                        <option value="Em viagem">Em viagem</option>
                        <option value="Falta justificada">Falta Just.</option>
                    </select>
                </div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
            listaAdm.innerHTML += `<div class="admin-item"><span>${nome}</span><button onclick="delFunc(${i})" style="color:red; border:none; background:none; font-weight:bold;">X</button></div>`;
        });
        monitorar();
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        const statusGps = document.getElementById('status-gps');
        if (modo === 'individual') {
            statusGps.classList.remove('hidden');
            obterGps();
        } else {
            statusGps.classList.add('hidden');
        }
    }

    async function obterGps() {
        const statusGps = document.getElementById('status-gps');
        statusGps.innerHTML = "⌛ Localizando...";
        statusGps.style.backgroundColor = "#6c757d";

        if (!navigator.geolocation) {
            statusGps.innerHTML = "❌ GPS não suportado";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude; 
            const lon = pos.coords.longitude;
            const agora = new Date();
            dadosLoc.hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            let plantaIdentificada = null;
            for (const p of pontosAlcoa) {
                if (calcularDistanciaMetros(lat, lon, p.lat, p.lon) <= 800) {
                    plantaIdentificada = p.nome;
                    break;
                }
            }

            if (plantaIdentificada) {
                dadosLoc.unidadeMsg = plantaIdentificada;
                dadosLoc.enderecoFormatado = plantaIdentificada;
                dadosLoc.statusMsg = "Presente na Planta";
                statusGps.innerHTML = `✅ ${plantaIdentificada} - ${dadosLoc.hora}`;
                statusGps.style.backgroundColor = "#075E54";
            } else {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    const rua = data.address.road || "Via identificada";
                    dadosLoc.unidadeMsg = "FORA DA PLANTA";
                    dadosLoc.enderecoFormatado = rua;
                    dadosLoc.statusMsg = "Ausente da planta";
                    statusGps.innerHTML = `🛑 FORA DA PLANTA - ${dadosLoc.hora}<br><small>${rua}</small>`;
                    statusGps.style.backgroundColor = "#d9534f";
                } catch (e) {
                    statusGps.innerHTML = `🛑 FORA DA PLANTA - ${dadosLoc.hora}`;
                }
            }
        }, (err) => { statusGps.innerHTML = "❌ GPS Desativado"; }, { enableHighAccuracy: true });
    }

    function monitorar() {
        let f=0, a=0, j=0, s=0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (!cb.checked) {
                sel.classList.remove('hidden');
                if (sel.value === "Férias") f++;
                else if (sel.value === "Atestado") a++;
                else if (sel.value === "Falta justificada") j++;
                else s++;
            } else { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    function enviarWhatsapp() {
        const modo = document.getElementById('modo-envio').value;
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = "";

        if (modo === "individual") {
            const nome = document.getElementById('select-individual').value;
            msg = `*RELATÓRIO DE FREQUÊNCIA INDIVIDUAL*\n\n✅ *Empresa: Telejur*\n📅 Data: ${data}\n⏰ Hora: ${dadosLoc.hora}\n👤 Funcionário: _${nome}_\n\n🏢 *Unidade:* ${dadosLoc.unidadeMsg}\n📍 *Local:* ${dadosLoc.enderecoFormatado}\n📊 *Status:* ${dadosLoc.statusMsg}\n🔗 *Link GPS:* ${dadosLoc.link}`;
        } else {
            let p=[], f=[], a=[], v=[], j=[], ft=[];
            equipe.forEach((nome, i) => {
                const cb = document.getElementById(`check-${i}`);
                if (cb.checked) p.push(`_${nome}_`);
                else {
                    const m = document.getElementById(`motivo-${i}`).value;
                    if (m === "Férias") f.push(`_${nome}_`);
                    else if (m === "Atestado") a.push(`_${nome}_`);
                    else if (m === "Em viagem") v.push(`_${nome}_`);
                    else if (m === "Falta justificada") j.push(`_${nome}_`);
                    else ft.push(`_${nome}_`);
                }
            });
            msg = `✅ *Telejur - Frequência*\nData: ${data}\n\n✔️ *Efetivo:* ${p.length}\n${p.join('\n')}\n\n` +
                  (f.length ? `✔️ *Férias:* ${f.join(', ')}\n` : "") +
                  (a.length ? `✔️ *Atestado:* ${a.join(', ')}\n` : "") +
                  (ft.length ? `❌ *Faltas:* ${ft.join(', ')}` : "");
        }
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    function abrirPainelAdmin() { if(prompt("Senha:") === "123") { document.getElementById('secao-principal').classList.add('hidden'); document.getElementById('admin-area').classList.remove('hidden'); } }
    function sairAdmin() { document.getElementById('secao-principal').classList.remove('hidden'); document.getElementById('admin-area').classList.add('hidden'); }
    function addFunc() { const n = document.getElementById('novo-nome').value; if(n) { equipe.push(n); carregarLista(); document.getElementById('novo-nome').value = ""; } }
    function delFunc(i) { if(confirm("Remover?")) { equipe.splice(i, 1); carregarLista(); } }

    window.onload = carregarLista;
</script>
</body>
</html>
