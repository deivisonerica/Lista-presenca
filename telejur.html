<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; }
        .header-title { display: flex; align-items: center; justify-content: center; gap: 10px; color: #075E54; margin-bottom: 20px; font-size: 20px; font-weight: bold; }
        .btn-admin-top { position: absolute; top: 15px; right: 15px; background: #007bff; color: white; border: none; padding: 5px 12px; border-radius: 50px; font-size: 10px; cursor: pointer; }
        label.label-peq { font-size: 11px; font-weight: bold; color: #075E54; display: block; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; font-size: 15px; border-radius: 10px; border: 1px solid #ccc; padding: 12px; background: #fff; margin-bottom: 15px; box-sizing: border-box; }
        
        /* CORREÇÃO DO CARD DE LOCALIZAÇÃO */
        .btn-gps { background-color: #d9534f; color: white; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; width: 100%; box-sizing: border-box; text-align: center; display: flex; flex-direction: column; }

        /* LISTA DE NOMES */
        .item-lista { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f1f1; gap: 10px; }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-info input { transform: scale(1.3); margin-left: 5px; }
        .sel-motivo { width: auto; margin-bottom: 0; padding: 5px; font-size: 12px; border-radius: 5px; }
        
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 18px; font-size: 16px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-admin-top" onclick="loginGestao()">⚙️ GESTÃO</button>
    <div id="interface-usuario">
        <div class="header-title">📋 Frequência Telejur</div>
        <label class="label-peq">Modo de Envio:</label>
        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual (Validar Local)</option>
        </select>
        <div id="status-gps" class="btn-gps hidden">⌛ Localizando...</div>
        <div id="campos-geral">
            <label class="label-peq">Efetivo na Planta:</label>
            <div id="corpo-lista">Buscando equipe...</div>
        </div>
        <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar no WhatsApp</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="text-align:center;">Gestão</h3>
        <input type="text" id="novo-nome" placeholder="Novo nome...">
        <button onclick="addFunc()" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:8px;">ADICIONAR</button>
        <div id="lista-admin" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
        <button onclick="sairGestao()" style="width:100%; margin-top:10px; padding:10px;">VOLTAR</button>
    </div>
</div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    let equipe = [];

    function api(p, cb) {
        const id = 'cb'+Date.now();
        window[id] = (d) => { cb(d); delete window[id]; document.getElementById(id).remove(); };
        const s = document.createElement('script'); s.id = id;
        s.src = `${URL_GOOGLE}?${p}&callback=${id}`;
        document.body.appendChild(s);
    }

    function carregar() { api("acao=ler", (d) => { equipe = d; exibir(); }); }

    function exibir() {
        const lista = document.getElementById('corpo-lista');
        const adm = document.getElementById('lista-admin');
        lista.innerHTML = ""; adm.innerHTML = "";
        equipe.forEach((n, i) => {
            lista.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="c-${i}" checked onchange="document.getElementById('m-${i}').classList.toggle('hidden', this.checked)">
                        <span class="nome-func">${n}</span>
                    </div>
                    <select id="m-${i}" class="sel-motivo hidden">
                        <option value="Férias">Férias</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Viagem">Em viagem</option>
                        <option value="Justificada">F. Justificada</option>
                        <option value="Falta">Falta não justificada</option>
                    </select>
                </div>`;
            adm.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">${n} <b style="color:red; cursor:pointer;" onclick="delFunc('${n}')">🗑️</b></div>`;
        });
    }

    function enviarWhatsapp() {
        const data = new Date().toLocaleDateString('pt-BR');
        let p = [], f = [], a = [], v = [], j = [], nj = [];

        equipe.forEach((n, i) => {
            if (document.getElementById(`c-${i}`).checked) p.push(n);
            else {
                const m = document.getElementById(`m-${i}`).value;
                if (m === "Férias") f.push(n);
                else if (m === "Atestado") a.push(n);
                else if (m === "Viagem") v.push(n);
                else if (m === "Justificada") j.push(n);
                else nj.push(n);
            }
        });

        let msg = `Segue Lista de frequência de hoje.\n\n`;
        msg += `✅ *Empresa: Telejur*\nData: ${data}\n\n`;
        msg += `✔️ *Efetivo na planta: ${p.length}*\n` + p.map(n => `_${n}_`).join('\n') + `\n\n`;
        msg += `✔️ *Férias (${f.length})*\n` + f.join(', ') + `\n\n`;
        msg += `✔️ *Atestado (${a.length})*\n` + a.join(', ') + `\n\n`;
        msg += `✔️ *Em viagem (${v.length})*\n` + v.join(', ') + `\n\n`;
        msg += `✔️ *Falta justificada (${j.length})*\n` + j.join(', ') + `\n\n`;
        msg += `✔️ *Faltas (${nj.length})*\n` + nj.join(', ');

        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    function addFunc() { const n = document.getElementById('novo-nome').value; if(!n) return; api(`acao=add&nome=${encodeURIComponent(n)}&senha=123`, () => { carregar(); document.getElementById('novo-nome').value=""; }); }
    function delFunc(n) { if(confirm("Excluir?")) api(`acao=deletar&nome=${encodeURIComponent(n)}&senha=123`, () => carregar()); }
    function loginGestao() { const s = prompt("Senha:"); if(s === "123") { document.getElementById('interface-usuario').classList.add('hidden'); document.getElementById('secao-gestao').classList.remove('hidden'); } }
    function sairGestao() { document.getElementById('interface-usuario').classList.remove('hidden'); document.getElementById('secao-gestao').classList.add('hidden'); }
    function alternarModo() { const ind = document.getElementById('modo-envio').value === 'individual'; document.getElementById('campos-geral').classList.toggle('hidden', ind); document.getElementById('status-gps').classList.toggle('hidden', !ind); if(ind) navigator.geolocation.getCurrentPosition((pos) => { const h = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); document.getElementById('status-gps').innerHTML = `🛑 FORA DA PLANTA - ${h}<br><small>Via Identificada</small>`; }); }

    window.onload = carregar;
</script>
</body>
</html>
